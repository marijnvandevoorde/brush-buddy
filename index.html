<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#FF6FAE" />
  <title>Brush Buddy</title>
  <meta name="description" content="A friendly mascot that guides kids through brushing each quadrant of their teeth for two minutes." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/favicon.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Brush Buddy" />

  <!-- Fonts: Baloo 2 (display) + Nunito (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app" id="app" data-theme="candy">
    <!-- Header -->
    <header class="hdr">
      <div class="hdr-row">
        <h1 class="title">Brush Buddy</h1>
        <div class="hdr-right">
          <button id="calmBtn" class="sound-btn" aria-label="Toggle calm mode" aria-pressed="false" title="Calm mode">☀️</button>
          <button id="soundBtn" class="sound-btn" aria-label="Toggle sound" title="Toggle sound">🔊</button>
          <span id="status" class="status">Ready</span>
        </div>
      </div>
      <div class="dots" id="dots" aria-hidden="true"></div>
      <!-- streaks.js renders its pill here -->
      <div id="streak-mount" class="streak-mount"></div>
    </header>

    <!-- Stage -->
    <section class="stage">
      <p id="surfaceCue" class="surface-cue" aria-live="polite"></p>
      <div class="ring-box" id="ringBox">
        <!-- glowing arc behind the active quadrant -->
        <svg class="arc-svg" viewBox="0 0 320 320" aria-hidden="true">
          <circle class="arc-track" cx="160" cy="160" r="118" fill="none" stroke-width="34" />
          <circle id="arc" class="arc-hl" cx="160" cy="160" r="118" fill="none" stroke-width="34" stroke-linecap="round" />
        </svg>

        <!-- ring of teeth (built by JS) -->
        <div class="teeth" id="teeth" aria-hidden="true"></div>

        <!-- section labels (built by JS, positioned around the ring) -->
        <div class="labels" id="labels" aria-hidden="true"></div>

        <!-- mascot in the center -->
        <div class="buddy">
          <div class="buddy-halo"></div>
          <svg class="cd-svg" viewBox="0 0 100 100" aria-hidden="true">
            <circle class="cd-track" cx="50" cy="50" r="46" fill="none" stroke-width="6" />
            <circle id="cdRing" class="cd-ring" cx="50" cy="50" r="46" fill="none" stroke-width="6" stroke-linecap="round" />
          </svg>
          <div class="buddy-body" id="buddyBody" role="img" aria-label="Brushing buddy">
            <svg class="tooth-svg" viewBox="0 0 100 116" aria-hidden="true">
              <path class="tooth-shape" d="M50 5 C76 5 91 19 91 43 C91 60 89 69 85 77 C81 86 80 111 69 111 C60 111 60 87 50 87 C40 87 40 111 31 111 C20 111 19 86 15 77 C11 69 9 60 9 43 C9 19 24 5 50 5 Z"/>
              <ellipse class="tooth-shade" cx="50" cy="66" rx="33" ry="30" fill="#000" opacity="0.045"/>
            </svg>
            <div class="dirt" id="dirt" aria-hidden="true"></div>
            <div class="face">
              <div class="eyes">
                <i class="eye"></i>
                <i class="eye"></i>
              </div>
              <svg class="mouth-svg" viewBox="0 0 100 50">
                <path id="mouth" d="M20 32 Q50 14 80 32" fill="transparent" stroke="#2A2A2A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </div>
            <span class="sparkle sparkle-1" aria-hidden="true">✨</span>
            <span class="sparkle sparkle-2" aria-hidden="true">✨</span>
          </div>
        </div>
      </div>

      <p class="says" id="says">Ready? Let's brush!</p>
    </section>

    <!-- Controls -->
    <div class="controls">
      <button id="primary" class="btn-primary">Start brushing</button>
      <button id="reset" class="btn-text">Start over</button>
    </div>

    <!-- tooth-fairy finale -->
    <div id="fairyLayer" class="fairy-layer" aria-hidden="true"></div>
  </main>

  <script src="streak-logic.js"></script>
  <script src="app.js"></script>
  <script src="streaks.js"></script>
</body>
</html>
